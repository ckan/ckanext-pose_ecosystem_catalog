{% if tags %}
  {% set tools_index_route = type+'.search'  %}

  <section class="tags">
  {% set _class = 'tag-list well' %}
  {% block tag_list %}
    <ul class="{{ _class }}">
      {% for tag in tags %}
        <li>
            <a class="{% block tag_list_item_class %}tag{% endblock %}" href="{{ h.url_for(tools_index_route, tags=tag.name) }}" rel="nofollow">{{ tag.display_name|truncate(22) }}</a>
        </li>
      {% endfor %}
    </ul>
  {% endblock %}
  </section>
{% endif %}
